name: Build & Push Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Imagen standalone (solo frontend, nginx + proxy_pass http://backend:8765) —
  # usada por docker-compose.yml en modo split-container (backend + frontend
  # como servicios separados), a diferencia de la imagen unificada de abajo.
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: iagenthub/frontend:vanilla
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout iagentshub (Dockerfile + scripts)
        uses: actions/checkout@v4
        with:
          repository: iagentshub/iAgents
          path: iagentshub

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: iagentshub/backend_fastapi
          path: backend

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: iagentshub/frontend_vanilla
          path: frontend

      # Contrato del router soft-nav: los scripts de página se RE-EJECUTAN al
      # navegar sin recarga. let/const/class a nivel superior lanzan
      # "SyntaxError: already declared" en la re-ejecución y rompen la vista en
      # silencio. Usar var/function (re-declarables).
      - name: Verificar contrato soft-nav (sin let/const/class top-level en pages/)
        run: |
          BAD=$(grep -rnE '^(let|const|class) ' frontend/pages --include='*.js' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Declaraciones top-level prohibidas en scripts de página (rompen la navegación soft):"
            echo "$BAD"
            exit 1
          fi
          echo "OK: ningún let/const/class top-level en pages/"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Preparar contexto de build
        run: |
          mkdir -p build-ctx
          cp -r backend/  build-ctx/backend
          cp -r frontend/ build-ctx/frontend
          cp iagentshub/docker/Dockerfile.unified.vanilla     build-ctx/Dockerfile
          cp iagentshub/docker/supervisord.conf                build-ctx/supervisord.conf
          cp iagentshub/docker/entrypoint-unified-vanilla.sh   build-ctx/entrypoint-unified.sh

      - name: Build y push imagen multi-plataforma
        uses: docker/build-push-action@v5
        with:
          context: build-ctx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: iagenthub/iagentshub:vanilla
          cache-from: type=gha
          cache-to: type=gha,mode=max

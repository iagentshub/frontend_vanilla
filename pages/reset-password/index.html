<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iAgents Hub — Nueva contraseña</title>
  <script>(function () { var m = { noir: "dark-red", marble: "light-red", ember: "dark-orange", ocean: "dark-blue", forest: "dark-red", dusk: "dark-purple", light: "light-red" }; var t = localStorage.getItem("ga-theme") || "dark-red"; t = m[t] || t; document.documentElement.setAttribute("data-theme", t); })();</script>
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <link rel="stylesheet" href="/assets/themes/themes.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/login/login.css">
</head>

<body class="login-page">
  <div class="login-wrap login-wrap--narrow">
    <div class="login-card">
      <div class="login-card-logo">iA</div>

      <div id="reset-invalid" style="display:none;text-align:center">
        <h2 style="margin-bottom:8px">Enlace inválido</h2>
        <p class="login-sub" style="margin-bottom:24px">El enlace ha expirado o ya fue usado.</p>
        <a href="/forgot-password/" class="btn btn-ghost btn-full" style="display:block;text-align:center">Solicitar
          nuevo enlace</a>
      </div>

      <div id="reset-form-wrap">
        <h2 style="margin-bottom:4px">Nueva contraseña</h2>
        <p class="login-sub" style="margin-bottom:24px">Elige una contraseña segura para tu cuenta</p>
        <form id="reset-form" novalidate>
          <div class="field">
            <label for="reset-pw">Nueva contraseña</label>
            <div class="field-pw">
              <input id="reset-pw" type="password" placeholder="Mínimo 8 caracteres" required
                autocomplete="new-password">
              <button type="button" id="toggle-pw" class="pw-toggle" tabindex="-1" aria-label="Mostrar contraseña">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <path d="M1 9s3-5.5 8-5.5S17 9 17 9s-3 5.5-8 5.5S1 9 1 9z" stroke="currentColor" stroke-width="1.5"
                    stroke-linejoin="round" />
                  <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5" />
                </svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label for="reset-pw2">Confirmar contraseña</label>
            <input id="reset-pw2" type="password" placeholder="Repite la contraseña" required
              autocomplete="new-password">
          </div>
          <div id="reset-error" class="form-error" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-full" id="reset-btn">Guardar contraseña</button>
        </form>
      </div>

      <div id="reset-ok" style="display:none;text-align:center">
        <h2 style="margin-bottom:8px">Contraseña actualizada</h2>
        <p class="login-sub" style="margin-bottom:24px">Ya puedes iniciar sesión con tu nueva contraseña.</p>
        <a href="/login/" class="btn btn-primary btn-full" style="display:block;text-align:center">Ir al login</a>
      </div>
    </div>
  </div>
  <script src="/assets/js/flog.js"></script>
  <script src="/reset-password/reset-password.js"></script>
</body>

</html>

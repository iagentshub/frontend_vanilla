<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iAgents Hub — Verificar cuenta</title>
  <script>(function () { var m = { noir: "dark-red", marble: "light-red", ember: "dark-orange", ocean: "dark-blue", forest: "dark-red", dusk: "dark-purple", light: "light-red" }; var t = localStorage.getItem("ga-theme") || "dark-red"; t = m[t] || t; document.documentElement.setAttribute("data-theme", t); })();</script>
  <link rel="stylesheet" href="/assets/css/variables.css" />
  <link rel="stylesheet" href="/assets/themes/themes.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/login/login.css">
</head>

<body class="login-page">
  <div class="login-wrap login-wrap--narrow">
    <div class="login-card" style="text-align:center">
      <div class="login-card-logo">iA</div>
      <div id="verify-loading">
        <h2 style="margin-bottom:8px">Verificando cuenta…</h2>
        <p class="login-sub">Un momento por favor</p>
      </div>
      <div id="verify-ok" style="display:none">
        <h2 style="margin-bottom:8px">¡Cuenta verificada!</h2>
        <p class="login-sub" style="margin-bottom:24px">Tu cuenta está activa. Ya puedes entrar.</p>
        <a href="/dashboard/" class="btn btn-primary btn-full" style="display:block;text-align:center">Ir al
          dashboard</a>
      </div>
      <div id="verify-error" style="display:none">
        <h2 style="margin-bottom:8px">Enlace inválido</h2>
        <p class="login-sub" style="margin-bottom:24px">El enlace de verificación es inválido o ha expirado.</p>
        <a href="/login/" class="btn btn-ghost btn-full" style="display:block;text-align:center">Volver al login</a>
      </div>
    </div>
  </div>
  <script src="/verify/verify.js"></script>
</body>

</html>

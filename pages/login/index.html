<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iAgents Hub — Login</title>
  <link rel="stylesheet" href="/pages/login/login.css">
</head>
<body class="login-page">
  <!-- animated background orbs -->
  <div class="login-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <button class="login-lang-btn" id="login-lang-btn">ES</button>

  <div class="login-wrap">
    <!-- left: branding -->
    <div class="login-brand">
      <div class="login-logo">iAgents<span>Hub</span></div>
      <h1 data-i18n="auth.headline">Toda tu IA en un solo lugar</h1>
      <p data-i18n="auth.sub">Agentes, skills y modelos multi-proveedor desde una sola plataforma.</p>
      <div class="login-stats">
        <div class="login-stat">
          <span class="stat-num">6<span class="stat-accent">+</span></span>
          <span class="stat-label" data-i18n="auth.stat_providers">Proveedores</span>
        </div>
        <div class="login-stat">
          <span class="stat-num"><span class="stat-accent">&#8734;</span></span>
          <span class="stat-label" data-i18n="auth.stat_agents">Agentes</span>
        </div>
        <div class="login-stat">
          <span class="stat-num">100<span class="stat-accent">%</span></span>
          <span class="stat-label" data-i18n="auth.stat_private">Privado</span>
        </div>
      </div>
    </div>

    <!-- right: form -->
    <div class="login-card">
      <div class="login-card-logo">iA</div>
      <h2 data-i18n="auth.card_title">Bienvenido</h2>
      <p class="login-sub" data-i18n="auth.card_sub">Accede a tu espacio de agentes</p>

      <form id="login-form" autocomplete="on" novalidate>
        <div class="field">
          <label for="login-email" data-i18n="auth.field_email">Email</label>
          <input id="login-email" type="email" name="email" autocomplete="email" placeholder="tu@email.com" required>
        </div>
        <div class="field">
          <label for="login-password" data-i18n="auth.field_password">Contraseña</label>
          <div class="field-pw">
            <input id="login-password" type="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
            <button type="button" id="toggle-pw" class="pw-toggle" tabindex="-1">👁</button>
          </div>
        </div>
        <div id="login-error" class="form-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn" data-i18n="auth.login_btn">Entrar</button>
      </form>

      <div class="login-divider"><span data-i18n="auth.divider">o</span></div>
      <button id="btn-guest" class="btn btn-ghost btn-full" data-i18n="auth.guest_login">Acceder como invitado</button>

      <p class="login-register-link"><span data-i18n="auth.register_text">¿No tienes cuenta?</span> <a href="/register/" data-i18n="auth.register_action">Crear cuenta</a></p>

      <div class="login-explore">
        <a href="/docs" data-i18n="auth.docs_link">Documentación</a>
        <span class="login-explore-sep"></span>
        <a href="/about" data-i18n="auth.about_link">¿Qué es esto?</a>
      </div>
    </div>
  </div>

  <script src="/assets/js/i18n.js"></script>
  <script src="/pages/login/login.js"></script>
  <script>
    (function () {
      var btn = document.getElementById('login-lang-btn');
      function sync() { if (window.i18n) btn.textContent = window.i18n.getLang().toUpperCase(); }
      btn.addEventListener('click', function () {
        var next = (window.i18n ? window.i18n.getLang() : 'es') === 'es' ? 'en' : 'es';
        if (window.i18n) window.i18n.setLang(next);
        sync();
      });
      if (window.i18n) { window.i18n.ready(sync); window.i18n.onLangChange(sync); }
    })();
  </script>
</body>
</html>

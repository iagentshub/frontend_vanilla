<!doctype html>
<html lang="es">

<head>
    <script src="/assets/js/theme-early.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Conexiones</title>
    <!-- CSS globales -->
    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/themes/themes.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/modals.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <!-- Componentes -->
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/assets/components/workspace-create-wizard/workspace-create-wizard.css" />
    <link rel="stylesheet" href="/assets/components/group-share-dialog/group-share-dialog.css" />
    <link rel="stylesheet" href="/assets/components/group-panel/group-panel.css" />
    <link rel="stylesheet" href="/assets/components/filter_connections/filter_connections.css" />
    <link rel="stylesheet" href="/assets/components/conn-card/conn-card.css" />
    <!-- Página -->
    <link rel="stylesheet" href="/assets/css/labels.css" />
    <link rel="stylesheet" href="/connections/connections.css" />
</head>

<body>
    <div class="app-shell">
        <div id="nav-root"></div>
        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title" data-i18n="connections.page.title">Conexiones</h1>
                    <p class="page-subtitle" data-i18n="connections.page.subtitle">Proveedores de IA configurados</p>
                </div>
                <div class="page-actions">
                    <button class="btn btn-ghost" id="btn-test-all">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                            <path d="M4 2.5l9 5.5-9 5.5V2.5z" stroke="currentColor" stroke-width="1.5"
                                stroke-linejoin="round" />
                        </svg>
                        <span data-i18n="connections.page.test_all">Testear todo</span>
                    </button>
                    <button class="btn btn-primary" id="btn-new-conn">
                        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                            <path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8"
                                stroke-linecap="round" />
                        </svg>
                        <span data-i18n="connections.page.new_btn">Nueva conexión</span>
                    </button>
                </div>
            </div>

            <!-- Pestañas de categoría -->
            <div class="conn-category-tabs" id="conn-category-tabs"
                style="display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0">
                <button class="conn-cat-tab active" data-cat="llm">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" />
                        <path d="M5 8h6M8 5v6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                    </svg>
                    APIs LLM
                </button>
                <button class="conn-cat-tab" data-cat="machine">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                        <rect x="2" y="3" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4" />
                        <path d="M5 14h6M8 11v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                    </svg>
                    Máquinas
                </button>
                <button class="conn-cat-tab" data-cat="database">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                        <ellipse cx="8" cy="4" rx="5" ry="2" stroke="currentColor" stroke-width="1.4" />
                        <path d="M3 4v4c0 1.1 2.24 2 5 2s5-.9 5-2V4" stroke="currentColor" stroke-width="1.4" />
                        <path d="M3 8v4c0 1.1 2.24 2 5 2s5-.9 5-2V8" stroke="currentColor" stroke-width="1.4" />
                    </svg>
                    Bases de datos
                </button>
            </div>

            <!-- Filtro -->
            <div id="filter-connections-root"></div>

            <!-- Layout: toggle grupos + (panel | contenido) -->
            <div class="af-wrapper">
                <div class="folder-toggle-row">
                    <button id="btn-toggle-groups" class="folder-toggle-btn" title="Grupos de trabajo">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                            <circle cx="5" cy="5" r="2" stroke="currentColor" stroke-width="1.4"/>
                            <circle cx="11" cy="5" r="2" stroke="currentColor" stroke-width="1.4"/>
                            <path d="M1.5 13v-.5A3.5 3.5 0 0 1 5 9a3.5 3.5 0 0 1 3.5 3.5V13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                            <path d="M9 9.2A3.5 3.5 0 0 1 14.5 12.5V13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <div class="af-layout">
                    <div class="af-groups-panel folder-panel--collapsed" id="conn-groups-panel"></div>
                    <div class="af-content">
                        <div id="connections-root"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal crear/editar -->
    <div id="conn-modal" class="modal-bg" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title" id="conn-modal-title" data-i18n="connections.modal.title_new">Nueva
                    conexión</span>
                <button class="modal-close" id="conn-modal-close" type="button">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <form id="conn-form" novalidate>
                <div class="modal-body">
                    <input type="hidden" id="conn-id" />
                    <div class="field">
                        <label data-i18n="connections.modal.field_name">Nombre *</label>
                        <input id="conn-name" class="input" data-i18n-placeholder="connections.modal.placeholder_name"
                            placeholder="Nombre de la conexión" required />
                    </div>
                    <div class="field">
                        <label data-i18n="connections.modal.field_provider">Proveedor</label>
                        <select id="conn-type" class="select">
                            <!-- poblado dinámicamente por connections-modal.js vía Providers -->
                        </select>
                    </div>
                    <div class="field" id="conn-scope-row" style="display:none">
                        <label data-i18n="connections.modal.field_scope">Guardar como</label>
                        <select id="conn-scope" class="select">
                            <option value="workspace" data-i18n="connections.modal.scope_workspace">Clave compartida
                            </option>
                            <option value="personal" data-i18n="connections.modal.scope_personal">Clave personal
                            </option>
                        </select>
                        <span class="input-hint" id="conn-scope-hint"></span>
                    </div>
                    <!-- campos dinámicos según proveedor — generados por buildDynamicFields() -->
                    <div id="conn-dynamic-fields"></div>
                    <div class="field">
                        <label data-i18n="agents.modal.field_labels">Etiquetas</label>
                        <div id="conn-labels-picker-wrap"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" id="conn-cancel"
                        data-i18n="common.actions.cancel">Cancelar</button>
                    <button type="submit" class="btn btn-primary" data-i18n="common.actions.save">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JS globales -->
    <script src="/assets/js/flog.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/toast.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/providers.js"></script>
    <script src="/assets/js/labels.js"></script>
    <!-- Componentes -->
    <script src="/assets/components/main_nav/main_nav.js"></script>
    <script src="/assets/components/workspace-create-wizard/workspace-create-wizard.js"></script>
    <script src="/assets/components/group-share-dialog/group-share-dialog.js"></script>
    <script src="/assets/components/group-panel/group-panel.js"></script>
    <script src="/assets/components/filter_connections/filter_connections.js"></script>
    <!-- Página -->
    <script src="/connections/connections-state.js"></script>
    <script src="/connections/connections-modal.js"></script>
    <script src="/assets/js/folder-toggle.js"></script>
    <script src="/connections/connections.js"></script>
</body>

</html>

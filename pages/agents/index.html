<!doctype html>
<html lang="es">

<head>
    <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("ga-theme") || "noir");</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Agentes</title>
    <!-- CSS globales -->
    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/themes/themes.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/modals.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <!-- Componentes -->
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/assets/components/agent-card/agent-card.css" />
    <link rel="stylesheet" href="/assets/components/filter_agents/filter_agents.css" />
    <link rel="stylesheet" href="/assets/components/dialog_chat/dialog_chat.css" />
    <link rel="stylesheet" href="/assets/components/agent-catalog/agent-catalog.css" />
    <!-- Página -->
    <link rel="stylesheet" href="/agents/agents.css" />
</head>

<body>
    <div class="app-shell">
        <div id="nav-root"></div>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title" data-i18n="agents.page.title">Agentes</h1>
                    <p class="page-subtitle" data-i18n="agents.page.subtitle">Gestiona y chatea con tus agentes de IA
                    </p>
                </div>
                <div class="page-actions">
                    <button class="btn btn-ghost" id="btn-catalog">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                            <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.6" />
                            <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                        </svg>
                        <span data-i18n="agents.catalog.open_btn">Catálogo</span>
                    </button>
                    <button class="btn btn-primary" id="btn-new-agent">
                        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                            <path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8"
                                stroke-linecap="round" />
                        </svg>
                        <span data-i18n="agents.modal.title_new">Nuevo agente</span>
                    </button>
                </div>
            </div>
            <div id="filter-agents-root"></div>
            <div id="agents-grid" class="agents-grid"></div>
        </main>
    </div>

    <!-- MODAL: Crear/Editar agente -->
    <div id="agent-modal" class="modal-bg" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title" id="agent-modal-title" data-i18n="agents.modal.title_new">Nuevo agente</span>
                <button class="modal-close" id="agent-modal-close" type="button">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <form id="agent-form" novalidate>
                <div class="modal-body">
                    <input type="hidden" id="agent-id" />
                    <div class="form-row-2">
                        <div class="field">
                            <label data-i18n="agents.modal.field_name">Nombre *</label>
                            <input id="agent-name" class="input" data-i18n-placeholder="agents.modal.placeholder_name"
                                placeholder="Mi agente" required />
                        </div>
                        <div class="field">
                            <label data-i18n="agents.modal.field_connection">Conexion IA</label>
                            <select id="agent-connection" class="select">
                                <option value="" data-i18n="agents.modal.no_connection">-- Sin conexion --</option>
                            </select>
                        </div>
                    </div>
                    <div class="field" id="agent-scope-field">
                        <label data-i18n="agents.modal.field_visibility">Visibilidad</label>
                        <div class="scope-radio-group">
                            <label class="scope-radio">
                                <input type="radio" name="agent-scope" value="private" checked />
                                <span data-i18n="agents.modal.scope_private">Privado</span>
                            </label>
                            <label class="scope-radio">
                                <input type="radio" name="agent-scope" value="public" />
                                <span data-i18n="agents.modal.scope_public">Público</span>
                            </label>
                        </div>
                    </div>
                    <div class="field">
                        <label data-i18n="agents.modal.field_description">Descripcion</label>
                        <input id="agent-desc" class="input" data-i18n-placeholder="agents.modal.placeholder_desc"
                            placeholder="Para que sirve este agente" />
                    </div>
                    <div class="field">
                        <label data-i18n="agents.modal.field_prompt">System prompt</label>
                        <textarea id="agent-prompt" class="textarea"
                            data-i18n-placeholder="agents.modal.placeholder_prompt" placeholder="Eres un asistente..."
                            style="min-height:100px"></textarea>
                    </div>
                    <div class="field">
                        <label data-i18n="agents.modal.field_temp">Temperatura</label>
                        <div class="range-wrap">
                            <input id="agent-temp" type="range" min="0" max="1" step="0.05" value="0.7" />
                            <span class="range-val" id="agent-temp-val">0.70</span>
                        </div>
                    </div>
                    <div class="field">
                        <label data-i18n="agents.modal.field_skills">Skills asignadas</label>
                        <div class="skill-picker" id="skill-picker">
                            <div class="skill-picker-chips" id="skill-selected-chips"></div>
                            <div class="skill-picker-tabs">
                                <button type="button" class="spt-tab active" data-tab="search">🔍 Buscar</button>
                                <button type="button" class="spt-tab" data-tab="browse">◈ Explorar</button>
                            </div>
                            <div class="skill-picker-panel" id="skill-panel-search">
                                <div class="skill-search-wrap">
                                    <input type="text" id="skill-search-input" class="skill-search-input"
                                        autocomplete="off" placeholder="Buscar skill..." />
                                    <div id="skill-search-dropdown" class="skill-search-dropdown" hidden></div>
                                </div>
                            </div>
                            <div class="skill-picker-panel" id="skill-panel-browse" hidden>
                                <div class="skill-cat-nav">
                                    <button type="button" class="skill-cat-arrow" id="skill-cat-prev">&#8249;</button>
                                    <div class="skill-cat-tabs" id="skill-cat-tabs"></div>
                                    <button type="button" class="skill-cat-arrow" id="skill-cat-next">&#8250;</button>
                                </div>
                                <div class="skill-picker-grid" id="skill-modules"></div>
                            </div>
                        </div>
                    </div>
                    <div class="field field-memory">
                        <div class="memory-toggle-row">
                            <label class="toggle-label">
                                <input type="checkbox" id="agent-use-memory" class="toggle-checkbox" />
                                <span class="toggle-track"></span>
                                <span data-i18n="agents.modal.field_memory">Habilitar memoria</span>
                            </label>
                        </div>
                        <div id="memory-file-field" style="display:none;margin-top:8px">
                            <label data-i18n="agents.modal.field_memory_file">Archivo de memoria</label>
                            <select id="agent-memory-file" class="select"></select>
                            <span class="input-hint" data-i18n="agents.modal.memory_hint">Usa el archivo del agente por
                                defecto o elige otro</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" id="agent-modal-cancel"
                        data-i18n="common.actions.cancel">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="agent-save-btn"
                        data-i18n="agents.modal.save_btn">Guardar agente</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL: Exportar -->
    <div id="export-modal" class="modal-bg" style="display:none">
        <div class="modal-box" style="width:400px">
            <div class="modal-header">
                <span class="modal-title" data-i18n="agents.export.title">Exportar agente</span>
                <button class="modal-close" id="export-modal-close" type="button">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p style="font-size:13px;color:var(--ink-2);margin-bottom:4px" data-i18n="agents.export.choose_format">
                    Elige el formato:</p>
                <div id="export-options" class="export-options"></div>
            </div>
        </div>
    </div>

    <!-- MODAL: Catálogo de agentes públicos -->
    <div id="agent-catalog-bg" class="modal-bg" style="display:none">
        <div class="ac-box">
            <div class="ac-header">
                <div class="ac-search-wrap">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.6" />
                        <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                    </svg>
                    <input id="ac-search" class="ac-search-input"
                        data-i18n-placeholder="agents.catalog.search_placeholder" placeholder="Buscar agentes…"
                        autocomplete="off" />
                </div>
                <button id="ac-close" class="modal-close" type="button">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div id="ac-grid" class="ac-grid"></div>
        </div>
    </div>

    <!-- JS globales -->
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/toast.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/utils.js"></script>
    <!-- Componentes -->
    <script src="/assets/components/main_nav/main_nav.js"></script>
    <script src="/assets/components/agent-card/agent-card.js"></script>
    <script src="/assets/components/filter_agents/filter_agents.js"></script>
    <script src="/assets/components/dialog_chat/dialog_chat.js"></script>
    <script src="/assets/components/agent-catalog/agent-catalog.js"></script>
    <!-- Página (orden importante: state → skill-picker → modal → export → init) -->
    <script src="/agents/agents-state.js"></script>
    <script src="/agents/agents-skill-picker.js"></script>
    <script src="/agents/agents-modal.js"></script>
    <script src="/agents/agents-export.js"></script>
    <script src="/agents/agents.js"></script>
</body>

</html>

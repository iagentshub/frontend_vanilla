<!doctype html>
<html lang="es">
<head>
    <script src="/assets/js/theme-early.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Explorar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="/assets/dist/core.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/assets/components/workspace-create-wizard/workspace-create-wizard.css" />
    <link rel="stylesheet" href="/assets/css/labels.css" />
    <link rel="stylesheet" href="/assets/css/modals.css" />
    <link rel="stylesheet" href="/explore/explore.css" />
    <style>
        .explore-card-try-btn {
            font-size: 11px;
            padding: 3px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface-2, #f8f9fa);
            color: var(--ink-1);
            cursor: pointer;
            white-space: nowrap;
        }
        .explore-card-try-btn:hover {
            background: var(--primary, #4f46e5);
            color: #fff;
            border-color: transparent;
        }
        .explore-card-verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            font-weight: 500;
            white-space: nowrap;
            margin-left: 4px;
        }
    </style>
</head>
<body>
<div class="app-shell">
    <div id="nav-root"></div>

    <main class="page-content explore-page">

        <!-- Header -->
        <div class="page-header">
            <div class="page-header-left">
                <h1 class="page-title" data-i18n="explore.title">Explorar</h1>
                <p class="page-subtitle" data-i18n="explore.subtitle">Descubre agentes, skills y conocimiento público de la comunidad</p>
            </div>
        </div>

        <!-- Filters bar -->
        <div class="explore-filters">
            <div class="explore-search-wrap">
                <svg class="explore-search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input id="explore-search" class="explore-search" type="search"
                    data-i18n-placeholder="explore.search_placeholder" placeholder="Buscar recursos..." />
            </div>
            <select id="explore-type" class="select explore-type-select">
                <option value="all"       data-i18n="explore.type_all">Todo</option>
                <option value="agent"     data-i18n="explore.type_agents">Agentes</option>
                <option value="skill"     data-i18n="explore.type_skills">Skills</option>
                <option value="knowledge" data-i18n="explore.type_knowledge">Knowledge</option>
                <option value="users"     data-i18n="explore.type_users">Usuarios</option>
            </select>
<button id="explore-search-btn" class="btn btn-primary explore-search-btn" data-i18n="explore.btn_search">Buscar</button>
        </div>

        <!-- Results -->
        <div id="explore-loading" class="explore-loading" hidden>
            <div class="spinner"></div>
        </div>
        <div id="explore-empty" class="explore-empty">
            <p id="explore-empty-msg" data-i18n="explore.prompt">Elige un tipo y escribe tu búsqueda para explorar.</p>
        </div>
        <div id="explore-grid" class="explore-grid"></div>
        <div id="explore-load-more" hidden style="text-align:center;padding:24px 0">
            <button class="btn btn-ghost" id="explore-load-more-btn" data-i18n="explore.load_more">Cargar más</button>
        </div>

    </main>
</div>

<!-- Modal de previsualización -->
<div id="explore-preview-modal" class="modal-bg" style="display:none">
    <div class="modal-box ep-box" style="max-height:80vh;display:flex;flex-direction:column">
        <div class="modal-header">
            <span class="modal-title" id="ep-modal-title"></span>
            <button class="modal-close" id="ep-close" type="button">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div id="ep-content" class="modal-body" style="overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px"></div>
    </div>
</div>

<!-- Modal Probar agente -->
<div id="explore-try-modal" class="modal-bg" style="display:none">
    <div class="modal-box" style="max-width:480px;width:90%">
        <div class="modal-header">
            <span class="modal-title" id="et-title">Probar agente</span>
            <button class="modal-close" id="et-close" type="button">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;gap:12px">
            <div>
                <label style="font-size:13px;font-weight:500;margin-bottom:4px;display:block">Connection</label>
                <select id="et-conn-select" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--ink-1);font-size:13px"></select>
            </div>
            <div>
                <label style="font-size:13px;font-weight:500;margin-bottom:4px;display:block">Mensaje</label>
                <textarea id="et-message" rows="3" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--ink-1);font-size:13px;resize:vertical" placeholder="Escribe tu mensaje..."></textarea>
            </div>
            <div id="et-warnings" hidden style="background:#fffbeb;border:1px solid #fbbf24;border-radius:6px;padding:8px 12px;font-size:12px;color:#92400e"></div>
            <div id="et-result" hidden style="background:var(--surface-2,#f8f9fa);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:13px;white-space:pre-wrap;max-height:200px;overflow-y:auto"></div>
            <button id="et-submit" class="btn btn-primary" style="align-self:flex-end">Enviar</button>
        </div>
    </div>
</div>

<script src="/assets/js/i18n.js" defer></script>
<script src="/assets/js/config.js" defer></script>
<script src="/assets/js/utils.js" defer></script>
<script src="/assets/js/api.js" defer></script>
<script src="/assets/js/theme.js" defer></script>
<script src="/assets/js/auth.js" defer></script>
<script src="/assets/js/labels.js" defer></script>
<script src="/assets/components/main_nav/main_nav.js" defer></script>
<script src="/assets/components/workspace-create-wizard/workspace-create-wizard.js" defer></script>
<script src="/assets/js/soft-nav.js" defer></script>
<script src="/explore/explore.js" defer></script>
    <script type="speculationrules">
    {
      "prefetch": [{
        "source": "document",
        "where": { "and": [
          { "href_matches": "/*" },
          { "not": { "href_matches": "/api/*" } },
          { "not": { "selector_matches": "[target=_blank]" } },
          { "not": { "selector_matches": "[rel~=nofollow]" } }
        ]},
        "eagerness": "moderate"
      }]
    }
    </script>
</body>
</html>

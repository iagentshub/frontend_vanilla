<!doctype html>
<html lang="es">

<head>
    <script src="/assets/js/theme-early.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Memoria</title>
    <!-- CSS globales -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="/assets/dist/core.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/modals.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <!-- Componentes -->
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/assets/components/workspace-create-wizard/workspace-create-wizard.css" />
    <link rel="stylesheet" href="/assets/components/filter_memory/filter_memory.css" />
    <link rel="stylesheet" href="/assets/components/action-menu/action-menu.css" />
    <!-- Página -->
    <link rel="stylesheet" href="/memory/memory.css" />
</head>

<body>
    <div class="app-shell">
        <div id="nav-root"></div>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title" data-i18n="memory.page.title">Memoria</h1>
                    <p class="page-subtitle" data-i18n="memory.page.subtitle">Archivos de contexto persistente para tus agentes</p>
                </div>
                <div class="page-actions">
                    <button class="btn btn-primary" id="btn-new-memory">
                        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                            <path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                        </svg>
                        <span data-i18n="memory.page.new_btn">Nueva</span>
                        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="margin-left:2px;opacity:.7">
                            <path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <input type="file" id="memory-file-input" accept=".md,.json" style="display:none">
            </div>

            <div id="filter-memory-root"></div>
            <div id="memory-grid" class="memory-grid"></div>
        </main>
    </div>

    <!-- MODAL: editor de memoria -->
    <div id="memory-modal" class="modal-bg" style="display:none">
        <div class="modal-box mem-modal-box">
            <div class="modal-header">
                <span class="modal-title" id="memory-modal-title" data-i18n="memory.modal.title_new">Nueva memoria</span>
                <button class="modal-close" id="memory-modal-close" type="button">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="field-filename" class="field">
                    <label data-i18n="memory.modal.field_name">Nombre del archivo</label>
                    <div class="mem-filename-wrap">
                        <input id="mem-filename" class="input" placeholder="mi-agente" autocomplete="off" />
                        <span class="mem-filename-ext">.md</span>
                    </div>
                    <span class="input-hint">Solo letras, números y guiones. Se guardará como
                        <code>{nombre}.md</code></span>
                </div>
                <div class="field">
                    <label data-i18n="memory.modal.field_content">Contenido (Markdown)</label>
                    <textarea id="mem-content" class="textarea mem-textarea"
                        placeholder="# Contexto del agente&#10;&#10;Escribe aquí el contexto..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" id="mem-cancel" data-i18n="common.actions.cancel">Cancelar</button>
                <button type="button" class="btn btn-primary" id="mem-save-btn" data-i18n="memory.modal.save_btn">Guardar</button>
            </div>
        </div>
    </div>

    <!-- JS globales -->
    <script src="/assets/js/flog.js" defer></script>
    <script src="/assets/js/i18n.js" defer></script>
    <script src="/assets/js/config.js" defer></script>
    <script src="/assets/js/theme.js" defer></script>
    <script src="/assets/js/toast.js" defer></script>
    <script src="/assets/js/auth.js" defer></script>
    <script src="/assets/js/api.js" defer></script>
    <script src="/assets/js/utils.js" defer></script>
    <!-- Componentes -->
    <script src="/assets/components/main_nav/main_nav.js" defer></script>
    <script src="/assets/components/workspace-create-wizard/workspace-create-wizard.js" defer></script>
    <script src="/assets/components/filter_memory/filter_memory.js" defer></script>
    <script src="/assets/components/action-menu/action-menu.js" defer></script>
    <!-- Página -->
    <script src="/assets/js/soft-nav.js" defer></script>
    <script src="/memory/memory-render.js" defer></script>
    <script src="/memory/memory-modal.js" defer></script>
    <script src="/memory/memory-load.js" defer></script>
    <script src="/memory/memory.js" defer></script>
    <script type="speculationrules">
    {
      "prefetch": [{
        "source": "document",
        "where": { "and": [
          { "href_matches": "/*" },
          { "not": { "href_matches": "/api/*" } },
          { "not": { "selector_matches": "[target=_blank]" } },
          { "not": { "selector_matches": "[rel~=nofollow]" } }
        ]},
        "eagerness": "moderate"
      }]
    }
    </script>
</body>

</html>

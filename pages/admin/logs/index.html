<!doctype html>
<html lang="es">

<head>
    <script src="/assets/js/theme-early.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="/assets/dist/core.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
</head>

<body>
    <div class="app-shell">
        <div id="nav-root"></div>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title" data-i18n="admin.logs.tab">Logs</h1>
                    <p class="page-subtitle" data-i18n="admin.logs.subtitle">Actividad del sistema en tiempo real</p>
                </div>
            </div>

            <!-- Pestañas internas -->
            <div class="logs-inner-tabs">
                <button class="logs-inner-tab active" data-tab="summary"
                    data-i18n="admin.logs.tab_summary">Resumen</button>
                <button class="logs-inner-tab" data-tab="viewer" data-i18n="admin.logs.tab_viewer">Visor</button>
            </div>

            <!-- Panel resumen -->
            <div id="logs-panel-summary">
                <div id="logs-summary-grid" class="logs-summary-grid"></div>
            </div>

            <!-- Panel visor -->
            <div id="logs-panel-viewer" style="display:none">
                <div class="logs-row">
                    <select id="logs-date-select" class="logs-select"></select>
                    <select id="logs-level-select" class="logs-select">
                        <option value="" data-i18n="admin.logs.filter_all">Todos</option>
                        <option value="DEBUG">DEBUG</option>
                        <option value="INFO">INFO</option>
                        <option value="OK">OK</option>
                        <option value="WARNING">WARNING</option>
                        <option value="ERROR">ERROR</option>
                    </select>
                    <select id="logs-service-select" class="logs-select">
                        <option value="" data-i18n="admin.logs.filter_all">Todos</option>
                        <option value="backend" data-i18n="admin.logs.service_backend">Backend</option>
                        <option value="frontend" data-i18n="admin.logs.service_frontend">Frontend</option>
                    </select>
                    <input id="logs-search" type="search" class="logs-search"
                        data-i18n-placeholder="admin.logs.search_placeholder">
                    <button id="btn-logs-refresh" class="btn btn-ghost btn-sm logs-icon-btn" title="↺">↺</button>
                    <a id="btn-logs-download" class="btn btn-ghost btn-sm logs-icon-btn" download style="display:none"
                        title="⬇">⬇</a>
                </div>
                <div class="logs-table-wrap">
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th class="logs-th sortable" data-col="date" data-i18n="admin.logs.col_date">Fecha</th>
                                <th class="logs-th sortable" data-col="ts" data-i18n="admin.logs.col_time">Hora</th>
                                <th class="logs-th sortable" data-col="level" data-i18n="admin.logs.col_level">Nivel
                                </th>
                                <th class="logs-th sortable" data-col="ip" title="Haz clic para filtrar por IP">IP</th>
                                <th class="logs-th sortable" data-col="username"
                                    title="Haz clic para filtrar por usuario">Usuario</th>
                                <th class="logs-th sortable" data-col="source" data-i18n="admin.logs.col_service">
                                    Servicio</th>
                                <th class="logs-th" data-i18n="admin.logs.col_message">Mensaje</th>
                            </tr>
                        </thead>
                        <tbody id="logs-tbody"></tbody>
                    </table>
                </div>
                <p id="logs-count" class="logs-count"></p>
            </div>
        </main>
    </div>

    <script src="/assets/js/flog.js" defer></script>
    <script src="/assets/js/i18n.js" defer></script>
    <script src="/assets/js/config.js" defer></script>
    <script src="/assets/js/theme.js" defer></script>
    <script src="/assets/js/toast.js" defer></script>
    <script src="/assets/js/auth.js" defer></script>
    <script src="/assets/js/api.js" defer></script>
    <script src="/assets/js/utils.js" defer></script>
    <script src="/assets/components/main_nav/main_nav.js" defer></script>
    <script src="/assets/js/soft-nav.js" defer></script>
    <script src="/admin/admin-logs.js" defer></script>
    <script src="/admin/admin-logs-boot.js" defer></script>
    <script type="speculationrules">
    {
      "prefetch": [{
        "source": "document",
        "where": { "and": [
          { "href_matches": "/*" },
          { "not": { "href_matches": "/api/*" } },
          { "not": { "selector_matches": "[target=_blank]" } },
          { "not": { "selector_matches": "[rel~=nofollow]" } }
        ]},
        "eagerness": "moderate"
      }]
    }
    </script>
</body>

</html>

<!doctype html>
<html lang="es">
<head>
    <script src="/assets/js/theme-early.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Centinel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="/assets/dist/core.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
    <link rel="stylesheet" href="/admin/centinel/centinel.css" />
</head>
<body>
<div class="app-shell">
    <div id="nav-root"></div>
    <main class="page-content">

        <!-- ── Header ─────────────────────────────────────────────────── -->
        <div class="page-header">
            <div>
                <h1 class="page-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="vertical-align:-3px;margin-right:8px">
                        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Centinel
                </h1>
                <p class="page-subtitle" id="ctn-subtitle">Test runner del backend</p>
            </div>
            <div class="ctn-header-actions">
                <button id="btn-run" class="btn btn-primary btn-sm">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="margin-right:5px"><path d="M4 2l10 6-10 6V2z"/></svg>
                    Ejecutar
                </button>
                <button id="btn-rerun-failed" class="btn btn-ghost btn-sm" style="display:none">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" style="margin-right:5px"><path d="M2 8a6 6 0 1 0 1-3.2" stroke-linecap="round"/><path d="M2 2v3h3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Re-run fallidos
                </button>
                <button id="btn-abort" class="btn btn-danger btn-sm" style="display:none">
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="margin-right:5px"><rect x="3" y="3" width="10" height="10" rx="1"/></svg>
                    Abortar
                </button>
            </div>
        </div>

        <!-- ── Progress bar ───────────────────────────────────────────── -->
        <div id="ctn-progress-wrap" style="display:none">
            <div class="ctn-progress-track">
                <div id="ctn-progress-bar" class="ctn-progress-fill"></div>
            </div>
            <div class="ctn-progress-meta">
                <span id="ctn-progress-text">0%</span>
                <span id="ctn-progress-current" class="ctn-progress-current"></span>
            </div>
        </div>

        <!-- ── Resumen rápido ─────────────────────────────────────────── -->
        <div id="ctn-summary-bar" class="ctn-summary-bar" style="display:none"></div>

        <!-- ── Layout 2 columnas ──────────────────────────────────────── -->
        <div class="ctn-layout">

            <!-- Árbol de módulos -->
            <aside class="ctn-tree-panel">
                <div class="ctn-panel-hdr">
                    <span class="ctn-panel-title">Módulos</span>
                    <input type="search" id="ctn-tree-search" class="ctn-search" placeholder="Filtrar…">
                </div>
                <div id="ctn-tree" class="ctn-tree-body">
                    <div class="ctn-tree-loading">Descubriendo tests…</div>
                </div>
                <div class="ctn-tree-footer">
                    <button id="btn-select-all" class="btn btn-ghost btn-xs">Todo</button>
                    <button id="btn-deselect-all" class="btn btn-ghost btn-xs">Ninguno</button>
                    <span id="ctn-sel-count" class="ctn-sel-count"></span>
                </div>
            </aside>

            <!-- Panel de resultados -->
            <section class="ctn-results-panel">
                <div class="ctn-panel-hdr">
                    <span class="ctn-panel-title">Resultados</span>
                    <div class="ctn-filter-tabs">
                        <button class="ctn-filter-tab active" data-filter="all">Todos</button>
                        <button class="ctn-filter-tab" data-filter="failed">Fallidos</button>
                        <button class="ctn-filter-tab" data-filter="passed">Pasados</button>
                        <button class="ctn-filter-tab" data-filter="skipped">Omitidos</button>
                    </div>
                </div>
                <div id="ctn-results" class="ctn-results-body">
                    <div class="ctn-empty-state">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" opacity=".3">
                            <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                        </svg>
                        <p>Ejecuta los tests para ver los resultados</p>
                    </div>
                </div>
            </section>

        </div>

        <!-- ── Historial ──────────────────────────────────────────────── -->
        <div class="ctn-history-section">
            <div class="ctn-history-title">Historial reciente</div>
            <div id="ctn-history" class="ctn-history-list">
                <div class="ctn-history-empty">Sin ejecuciones previas</div>
            </div>
        </div>

    </main>
</div>

<script src="/assets/js/flog.js" defer></script>
<script src="/assets/js/i18n.js" defer></script>
<script src="/assets/js/config.js" defer></script>
<script src="/assets/js/theme.js" defer></script>
<script src="/assets/js/toast.js" defer></script>
<script src="/assets/js/auth.js" defer></script>
<script src="/assets/js/api.js" defer></script>
<script src="/assets/js/utils.js" defer></script>
<script src="/assets/components/main_nav/main_nav.js" defer></script>
<script src="/assets/js/soft-nav.js" defer></script>
<script src="/admin/centinel/centinel.js" defer></script>
<script src="/admin/centinel/centinel-boot.js" defer></script>
    <script type="speculationrules">
    {
      "prefetch": [{
        "source": "document",
        "where": { "and": [
          { "href_matches": "/*" },
          { "not": { "href_matches": "/api/*" } },
          { "not": { "selector_matches": "[target=_blank]" } },
          { "not": { "selector_matches": "[rel~=nofollow]" } }
        ]},
        "eagerness": "moderate"
      }]
    }
    </script>
</body>
</html>

<!doctype html>
<html lang="es">

<head>
    <script>(function () { var m = { noir: "dark-red", marble: "light-red", ember: "dark-orange", ocean: "dark-blue", forest: "dark-red", dusk: "dark-purple", light: "light-red" }; var t = localStorage.getItem("ga-theme") || "dark-red"; t = m[t] || t; document.documentElement.setAttribute("data-theme", t); })();</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Administración</title>
    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/themes/themes.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
    <link rel="stylesheet" href="/assets/css/modals.css" />
</head>

<body>
    <div class="app-shell">
        <div id="nav-root"></div>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Administración</h1>
                    <p class="page-subtitle">Panel de control del sistema</p>
                </div>
                <div class="admin-refresh">
                    <span id="refresh-label" class="refresh-label"></span>
                    <button id="btn-refresh" class="btn btn-ghost btn-sm" title="Actualizar ahora">↺</button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="general">General</button>
                <button class="admin-tab" data-tab="users">Usuarios</button>
                <button class="admin-tab" data-tab="workspaces">Workspaces</button>
                <button class="admin-tab" data-tab="teams">Grupos</button>
                <button class="admin-tab" data-tab="agents">Agentes</button>
                <button class="admin-tab" data-tab="connections">Conexiones</button>
                <button class="admin-tab" data-tab="knowledge">Conocimiento</button>
                <button class="admin-tab" data-tab="config">Configuración</button>
            </div>

            <!-- General tab: stats dashboard -->
            <div id="tab-general" class="admin-tab-panel">
                <div id="stats-grid" class="admin-stats-grid">
                    <div class="admin-stat-card skeleton"></div>
                    <div class="admin-stat-card skeleton"></div>
                    <div class="admin-stat-card skeleton"></div>
                    <div class="admin-stat-card skeleton"></div>
                </div>
            </div>

            <!-- Users tab -->
            <div id="tab-users" class="admin-tab-panel" style="display:none">
                <div class="admin-toolbar">
                    <div class="admin-search-wrap">
                        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.6" />
                                <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                            </svg></span>
                        <input id="user-search" type="search" class="admin-search" placeholder="Buscar por email…">
                    </div>
                    <select id="filter-role" class="admin-select">
                        <option value="">Todos los roles</option>
                        <option value="admin">Admin</option>
                        <option value="standard">Estándar</option>
                    </select>
                    <select id="filter-active" class="admin-select">
                        <option value="">Cualquier estado</option>
                        <option value="true">Activos</option>
                        <option value="false">Bloqueados</option>
                    </select>
                    <select id="filter-verified" class="admin-select">
                        <option value="">Verificación</option>
                        <option value="true">Verificados</option>
                        <option value="false">Sin verificar</option>
                    </select>
                </div>
                <div id="users-table-wrap">
                    <table class="admin-table">
                        <tbody>
                            <tr class="skeleton-row">
                                <td colspan="6"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="6"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="6"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Workspaces tab -->
            <div id="tab-workspaces" class="admin-tab-panel" style="display:none">
                <div class="admin-toolbar">
                    <div class="admin-search-wrap">
                        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.6" />
                                <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                            </svg></span>
                        <input id="ws-search" type="search" class="admin-search"
                            placeholder="Buscar por nombre o creador…">
                    </div>
                </div>
                <div id="workspaces-table-wrap">
                    <table class="admin-table">
                        <tbody>
                            <tr class="skeleton-row">
                                <td colspan="9"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="9"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="9"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Teams tab -->
            <div id="tab-teams" class="admin-tab-panel" style="display:none">
                <div class="admin-toolbar">
                    <div class="admin-search-wrap">
                        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.6" />
                                <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                            </svg></span>
                        <input id="team-search" type="search" class="admin-search"
                            placeholder="Buscar por nombre o creador…">
                    </div>
                </div>
                <div id="teams-table-wrap">
                    <table class="admin-table">
                        <tbody>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Agents tab -->
            <div id="tab-agents" class="admin-tab-panel" style="display:none">
                <div class="admin-toolbar">
                    <div class="admin-search-wrap">
                        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.6" />
                                <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                            </svg></span>
                        <input id="agent-search" type="search" class="admin-search" placeholder="Buscar agente…">
                    </div>
                    <select id="filter-agent-owner" class="admin-select">
                        <option value="">Todos los propietarios</option>
                    </select>
                </div>
                <div id="agents-table-wrap">
                    <table class="admin-table">
                        <tbody>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Connections tab -->
            <div id="tab-connections" class="admin-tab-panel" style="display:none">
                <div class="admin-toolbar">
                    <select id="filter-conn-owner" class="admin-select">
                        <option value="">Todos los propietarios</option>
                    </select>
                </div>
                <div id="connections-table-wrap">
                    <table class="admin-table">
                        <tbody>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Knowledge tab -->
            <div id="tab-knowledge" class="admin-tab-panel" style="display:none">
                <div class="admin-toolbar">
                    <div class="admin-search-wrap">
                        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.6" />
                                <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                            </svg></span>
                        <input id="knowledge-search" type="search" class="admin-search"
                            placeholder="Buscar por título o propietario…">
                    </div>
                    <select id="filter-knowledge-type" class="admin-select">
                        <option value="">Todos los tipos</option>
                        <option value="url">URL</option>
                        <option value="document">Documento</option>
                    </select>
                    <select id="filter-know-owner" class="admin-select">
                        <option value="">Todos los propietarios</option>
                    </select>
                </div>
                <div id="knowledge-table-wrap">
                    <table class="admin-table">
                        <tbody>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                            <tr class="skeleton-row">
                                <td colspan="5"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- ── TAB CONFIGURACIÓN ── -->
            <div id="tab-config" class="admin-tab-panel" style="display:none">
                <form id="config-form">
                    <div class="admin-config-grid">

                        <!-- Registro -->
                        <div class="admin-config-section">
                            <div class="admin-config-title">Registro</div>
                            <div class="admin-config-row">
                                <span class="admin-config-label">Modo</span>
                                <select id="cfg-registration" class="select admin-config-select">
                                    <option value="open">Abierto</option>
                                    <option value="invite">Solo invitación</option>
                                    <option value="closed">Cerrado</option>
                                </select>
                            </div>
                            <div class="admin-config-row">
                                <span class="admin-config-label">Máx. usuarios <span
                                        class="admin-config-hint">(0=∞)</span></span>
                                <input type="number" id="cfg-max-users" class="input admin-config-num" min="0" />
                            </div>
                            <div class="admin-config-toggle-row">
                                <label class="toggle">
                                    <input type="checkbox" id="cfg-email-verify" />
                                    <span class="toggle-track"></span>
                                    <span class="toggle-label">Verificar email al registrarse</span>
                                </label>
                            </div>
                            <div class="admin-config-toggle-row">
                                <label class="toggle">
                                    <input type="checkbox" id="cfg-guest-enabled" />
                                    <span class="toggle-track"></span>
                                    <span class="toggle-label">Acceso como invitado</span>
                                </label>
                            </div>
                        </div>

                        <!-- Sesiones + Logs -->
                        <div class="admin-config-section">
                            <div class="admin-config-title">Sesiones</div>
                            <div class="admin-config-row">
                                <span class="admin-config-label">Máx. sesiones simultáneas <span
                                        class="admin-config-hint">(0=∞)</span></span>
                                <input type="number" id="cfg-max-sessions" class="input admin-config-num" min="0" />
                            </div>

                            <div class="admin-config-title" style="margin-top:20px">Logs</div>
                            <div class="admin-config-row">
                                <span class="admin-config-label">Retención <span
                                        class="admin-config-hint">(días)</span></span>
                                <input type="number" id="cfg-log-retention" class="input admin-config-num" min="1"
                                    max="365" />
                            </div>

                            <div class="admin-config-title" style="margin-top:20px">Facturación</div>
                            <div class="admin-config-toggle-row">
                                <label class="toggle">
                                    <input type="checkbox" id="cfg-billing" />
                                    <span class="toggle-track"></span>
                                    <span class="toggle-label">Activar planes de suscripción</span>
                                </label>
                            </div>
                        </div>

                    </div><!-- /grid -->

                    <div style="margin-top:16px;display:flex;align-items:center;gap:12px">
                        <button type="submit" class="btn btn-primary" id="btn-save-config">Guardar</button>
                        <span id="config-save-msg" style="font-size:12px;color:var(--success)"></span>
                    </div>
                </form>
            </div>

        </main>
    </div>

    <!-- Modal detalle de grupo -->
    <div id="modal-team-detail" class="modal-bg" style="display:none">
        <div class="modal-box" style="max-width:560px">
            <div class="modal-header">
                <h3 class="modal-title" id="team-detail-title">Grupo</h3>
                <button class="modal-close" id="btn-team-detail-close">✕</button>
            </div>
            <div class="modal-body" id="team-detail-body" style="padding:0">
                <div style="padding:20px;text-align:center;color:var(--ink-3)">Cargando…</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="btn-team-detail-cancel">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Modal editar agente -->
    <div id="modal-edit-agent" class="modal-bg" style="display:none">
        <div class="modal-box" style="max-width:540px">
            <div class="modal-header">
                <h3 class="modal-title">Editar agente</h3>
                <button class="modal-close" id="btn-edit-agent-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="field">
                    <label>Nombre</label>
                    <input type="text" id="edit-agent-name" class="input">
                </div>
                <div class="modal-grid">
                    <div class="field">
                        <label>Tipo</label>
                        <select id="edit-agent-type" class="select">
                            <option value="claude">Claude</option>
                            <option value="openai">OpenAI</option>
                            <option value="github">GitHub</option>
                            <option value="ollama">Ollama</option>
                            <option value="generic">Genérico</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Modelo</label>
                        <input type="text" id="edit-agent-model" class="input" placeholder="p.ej. claude-opus-4-7">
                    </div>
                    <div class="field">
                        <label>ID de conexión</label>
                        <input type="text" id="edit-agent-conn" class="input" placeholder="(opcional)">
                    </div>
                    <div class="field">
                        <label>Temperatura</label>
                        <input type="number" id="edit-agent-temp" class="input" min="0" max="2" step="0.1">
                    </div>
                </div>
                <div class="field">
                    <label>Prompt del sistema</label>
                    <textarea id="edit-agent-prompt" class="textarea" rows="9"
                        style="font-family:var(--font-mono);font-size:12px;line-height:1.6"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="btn-edit-agent-cancel">Cancelar</button>
                <button class="btn btn-primary" id="btn-edit-agent-save">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal editar usuario -->
    <div id="modal-edit-user" class="modal-bg" style="display:none">
        <div class="modal-box" style="max-width:420px">
            <div class="modal-header">
                <h3 class="modal-title">Editar usuario</h3>
                <button class="modal-close" id="btn-edit-user-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="field">
                    <label>Email</label>
                    <input type="text" id="edit-user-email" class="input" disabled style="opacity:.6">
                </div>
                <div class="field">
                    <label>Rol</label>
                    <select id="edit-user-role" class="select">
                        <option value="standard">Estándar</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="field">
                    <label>Estado</label>
                    <label class="toggle">
                        <input type="checkbox" id="edit-user-active">
                        <span class="toggle-track"></span>
                        <span class="toggle-label" id="edit-user-active-label">Activo</span>
                    </label>
                </div>
                <div class="field">
                    <label>Nueva contraseña <span class="input-hint">(dejar vacío para no cambiar)</span></label>
                    <input type="password" id="edit-user-password" class="input" autocomplete="new-password">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="btn-edit-user-cancel">Cancelar</button>
                <button class="btn btn-primary" id="btn-edit-user-save">Guardar</button>
            </div>
        </div>
    </div>

    <script src="/assets/js/flog.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/toast.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/components/main_nav/main_nav.js"></script>
    <script src="/admin/admin-stats.js"></script>
    <script src="/admin/admin-users.js"></script>
    <script src="/admin/admin-workspaces.js"></script>
    <script src="/admin/admin-teams.js"></script>
    <script src="/admin/admin-agents.js"></script>
    <script src="/admin/admin-connections.js"></script>
    <script src="/admin/admin-knowledge.js"></script>
    <script src="/admin/admin-config.js"></script>
    <script src="/admin/admin.js"></script>
</body>

</html>

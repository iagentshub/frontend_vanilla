<!doctype html>
<html lang="es">

<head>
    <script>(function () { var m = { noir: "dark-red", marble: "light-red", ember: "dark-orange", ocean: "dark-blue", forest: "dark-red", dusk: "dark-purple", light: "light-red" }; var t = localStorage.getItem("ga-theme") || "dark-red"; t = m[t] || t; document.documentElement.setAttribute("data-theme", t); })();</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Metadata</title>
    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/themes/themes.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/modals.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
</head>

<body>
    <div class="app-shell">
        <div id="nav-root"></div>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Sistema</h1>
                    <p class="page-subtitle">Estado de la base de datos y actividad del sistema</p>
                </div>
            </div>

            <!-- Tabs principales -->
            <div class="admin-tabs" style="margin-bottom:24px">
                <button class="admin-tab active" data-meta-tab="logs"
                    onclick="window._metaSwitchTab('logs')">Logs</button>
                <button class="admin-tab" data-meta-tab="tables"
                    onclick="window._metaSwitchTab('tables')">Tablas</button>
            </div>

            <!-- ── Tab: Logs ── -->
            <div id="meta-panel-logs">
                <div id="logs-summary-grid" class="logs-summary-grid"></div>
            </div>

            <!-- ── Tab: Tablas ── -->
            <div id="meta-panel-tables" style="display:none">
                <!-- Buscador + contador -->
                <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
                    <input type="search" id="meta-table-search" class="input" placeholder="Buscar tabla…"
                        style="max-width:280px;height:32px" oninput="window._metaFilterTables()" />
                    <span id="meta-table-count" style="font-size:0.8rem;color:var(--text-2)"></span>
                </div>
                <!-- Tabla de metadatos -->
                <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">
                    <table style="width:100%;border-collapse:collapse;font-size:0.84rem">
                        <thead>
                            <tr style="background:var(--surface-2,var(--surface))">
                                <th id="th-name"
                                    style="text-align:left;padding:9px 14px;border-bottom:1px solid var(--border);font-weight:600;color:var(--text-2);cursor:pointer;user-select:none;white-space:nowrap">
                                    Tabla <span id="th-name-arrow" style="opacity:0.4">↕</span></th>
                                <th id="th-rows"
                                    style="text-align:right;padding:9px 14px;border-bottom:1px solid var(--border);font-weight:600;color:var(--text-2);cursor:pointer;user-select:none;white-space:nowrap">
                                    Filas <span id="th-rows-arrow" style="opacity:0.4">↕</span></th>
                                <th id="th-cols"
                                    style="text-align:right;padding:9px 14px;border-bottom:1px solid var(--border);font-weight:600;color:var(--text-2);cursor:pointer;user-select:none;white-space:nowrap">
                                    Columnas <span id="th-cols-arrow" style="opacity:0.4">↕</span></th>
                                <th id="th-size"
                                    style="text-align:right;padding:9px 14px;border-bottom:1px solid var(--border);font-weight:600;color:var(--text-2);cursor:pointer;user-select:none;white-space:nowrap">
                                    Peso <span id="th-size-arrow" style="opacity:0.4">↕</span></th>
                            </tr>
                        </thead>
                        <tbody id="meta-tables-tbody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- ── Dialog: navegador de tabla ── -->
    <div id="meta-table-dialog"
        style="display:none;position:fixed;inset:0;z-index:950;background:rgba(0,0,0,0.55);backdrop-filter:blur(2px)">
        <div
            style="position:absolute;inset:4% 3%;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.4)">
            <div
                style="display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);flex-shrink:0">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="opacity:0.5">
                    <rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4" />
                    <path d="M1 5h14M5 5v9" stroke="currentColor" stroke-width="1.3" />
                </svg>
                <span id="meta-table-dialog-title"
                    style="font-weight:700;font-size:0.95rem;font-family:monospace;flex:1"></span>
                <input id="meta-table-search-data" type="search" class="input"
                    style="height:30px;font-size:0.78rem;width:220px"
                    placeholder="Buscar en todos los campos… (Enter)" />
                <button class="btn btn-primary btn-sm" id="meta-table-search-btn">Buscar</button>
                <button id="meta-table-dialog-close" class="modal-close" type="button">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div id="meta-table-data-wrap" style="flex:1;overflow:auto;padding:0">
                <p style="text-align:center;padding:28px;color:var(--text-2)">Cargando…</p>
            </div>
        </div>
    </div>

    <!-- ── Modal: visor de logs por día ── -->
    <div id="logs-modal"
        style="display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.55);backdrop-filter:blur(2px)">
        <div
            style="position:absolute;inset:5% 4%;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.4)">

            <!-- Fila 1: título + botones -->
            <div
                style="display:flex;align-items:center;gap:10px;padding:12px 18px 10px;border-bottom:1px solid var(--border);flex-shrink:0">
                <span id="logs-modal-title" style="font-weight:700;font-size:0.95rem;flex:1"></span>
                <button id="btn-logs-refresh" class="btn btn-ghost btn-sm" title="Actualizar">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                        <path d="M2 8a6 6 0 0 1 6-6 6 6 0 0 1 4.24 1.76M14 8a6 6 0 0 1-6 6 6 6 0 0 1-4.24-1.76"
                            stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                        <path d="M12 2.5V6h-3.5M4 13.5V10h3.5" stroke="currentColor" stroke-width="1.6"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Actualizar
                </button>
                <a id="btn-logs-download" class="btn btn-ghost btn-sm" download style="display:none">⬇ CSV</a>
                <button id="btn-logs-modal-close" class="modal-close" type="button">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>

            <!-- Fila 2: filtros -->
            <div
                style="display:flex;align-items:center;gap:6px;padding:8px 18px 10px;border-bottom:1px solid var(--border);background:var(--surface-2,var(--surface));flex-shrink:0;overflow-x:auto">
                <select id="logs-level-select" class="select"
                    style="height:32px;padding:0 34px 0 10px;font-size:0.8rem;width:155px;flex:0 0 155px">
                    <option value="">Nivel</option>
                    <option value="DEBUG">DEBUG</option>
                    <option value="INFO">INFO</option>
                    <option value="OK">OK</option>
                    <option value="WARNING">WARNING</option>
                    <option value="ERROR">ERROR</option>
                </select>
                <select id="logs-service-select" class="select"
                    style="height:32px;padding:0 34px 0 10px;font-size:0.8rem;width:135px;flex:0 0 135px">
                    <option value="">Fuente</option>
                    <option value="BE">Backend</option>
                    <option value="FE">Frontend</option>
                </select>
                <input id="logs-ip-filter" type="text" class="input"
                    style="height:32px;padding:0 10px;font-size:0.8rem;width:130px;flex:0 0 130px" placeholder="IP…"
                    title="Haz clic en una IP de la tabla para rellenar" />
                <input id="logs-user-filter" type="text" class="input"
                    style="height:32px;padding:0 10px;font-size:0.8rem;width:130px;flex:0 0 130px"
                    placeholder="Usuario…" title="Haz clic en un usuario de la tabla para rellenar" />
                <input id="logs-search" type="search" class="input"
                    style="height:32px;padding:0 10px;font-size:0.8rem;flex:1;min-width:160px"
                    placeholder="Buscar en acción…" />
                <button class="btn btn-ghost btn-sm" id="logs-clear-filters"
                    style="height:32px;white-space:nowrap;flex-shrink:0">Limpiar</button>
            </div>

            <!-- Tabla de logs -->
            <div class="logs-table-wrap" style="flex:1;overflow:auto">
                <table class="logs-table" style="width:100%">
                    <thead>
                        <tr>
                            <th class="logs-th sortable" data-col="date">Fecha</th>
                            <th class="logs-th sortable" data-col="ts">Hora</th>
                            <th class="logs-th sortable" data-col="level">Nivel</th>
                            <th class="logs-th sortable" data-col="ip" title="Clic para filtrar por esta IP">IP</th>
                            <th class="logs-th sortable" data-col="username" title="Clic para filtrar por este usuario">
                                Usuario</th>
                            <th class="logs-th sortable" data-col="source">Fuente</th>
                            <th class="logs-th">Mensaje</th>
                        </tr>
                    </thead>
                    <tbody id="logs-tbody"></tbody>
                </table>
            </div>

            <!-- Footer del modal: contador + paginación -->
            <div
                style="padding:8px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0">
                <span id="logs-count" style="font-size:0.78rem;color:var(--text-2);flex:1"></span>
                <button class="btn btn-ghost btn-sm" id="logs-pag-prev" disabled>← Anterior</button>
                <span id="logs-pag-label" style="font-size:0.78rem;color:var(--text-2);white-space:nowrap"></span>
                <button class="btn btn-ghost btn-sm" id="logs-pag-next" disabled>Siguiente →</button>
            </div>
        </div>
    </div>

    <script src="/assets/js/flog.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/toast.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/components/main_nav/main_nav.js"></script>
    <script src="/admin/admin-logs.js"></script>
    <script src="/admin/admin-metadata.js"></script>
    <script>
        (async function () {
            await window.requireAuth();
            renderNav('nav-root', 'admin-metadata');
            window.adminMetadata.init();
        })();
    </script>
</body>

</html>

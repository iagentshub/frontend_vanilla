<div class="wcfg-body">
    <div class="wcfg-title">Uso de tokens</div>

    <div class="wcfg-field">
        <span class="wcfg-label">Tamano</span>
        <div class="wcfg-sizes">
            <label class="wcfg-size-card">
                <input type="radio" name="size" value="small">
                <span class="wcfg-size-visual wcfg-size-visual--s"></span>
                <span class="wcfg-size-name">Pequeno</span>
            </label>
            <label class="wcfg-size-card">
                <input type="radio" name="size" value="medium">
                <span class="wcfg-size-visual wcfg-size-visual--m"></span>
                <span class="wcfg-size-name">Mediano</span>
            </label>
            <label class="wcfg-size-card">
                <input type="radio" name="size" value="large">
                <span class="wcfg-size-visual wcfg-size-visual--l"></span>
                <span class="wcfg-size-name">Grande</span>
            </label>
        </div>
    </div>

    <div class="wcfg-field">
        <span class="wcfg-label">Visualizacion</span>
        <div class="wcfg-pills">
            <label class="wcfg-pill">
                <input type="radio" name="vizType" value="bars">
                <span class="wcfg-pill-label">Barras</span>
            </label>
            <label class="wcfg-pill">
                <input type="radio" name="vizType" value="donut">
                <span class="wcfg-pill-label">Donut</span>
            </label>
        </div>
    </div>

    <div class="wcfg-field">
        <span class="wcfg-label">Agrupar por</span>
        <div class="wcfg-pills">
            <label class="wcfg-pill">
                <input type="radio" name="groupBy" value="connection">
                <span class="wcfg-pill-label">Conexion</span>
            </label>
            <label class="wcfg-pill">
                <input type="radio" name="groupBy" value="agent">
                <span class="wcfg-pill-label">Agente</span>
            </label>
        </div>
    </div>

    <div class="wcfg-field">
        <span class="wcfg-label">Conexiones</span>
        <div class="wcfg-pills">
            <label class="wcfg-pill">
                <input type="radio" name="scope" value="all">
                <span class="wcfg-pill-label">Todas</span>
            </label>
            <label class="wcfg-pill">
                <input type="radio" name="scope" value="personal">
                <span class="wcfg-pill-label">Personales</span>
            </label>
        </div>
    </div>

    <div class="wcfg-field">
        <span class="wcfg-label">Maximo (Grande)</span>
        <select name="limit" class="select select--sm">
            <option value="3">Top 3</option>
            <option value="5">Top 5</option>
            <option value="10">Top 10</option>
        </select>
    </div>

    <div class="wcfg-actions">
        <button class="btn btn-ghost btn-sm" data-wcfg-cancel>Cancelar</button>
        <button class="btn btn-primary btn-sm" data-wcfg-save>Guardar</button>
    </div>
</div>

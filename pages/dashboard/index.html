<!doctype html>
<html lang="es">

<head>
    <script>(function(){var m={noir:"dark-red",marble:"light-red",ember:"dark-orange",ocean:"dark-blue",forest:"dark-red",dusk:"dark-purple",light:"light-red"};var t=localStorage.getItem("ga-theme")||"dark-red";t=m[t]||t;document.documentElement.setAttribute("data-theme",t);})();</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Dashboard</title>
    <!-- CSS globales -->
    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/themes/themes.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <!-- Componentes -->
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <!-- Página -->
    <link rel="stylesheet" href="/dashboard/dashboard.css" />
</head>

<body>
    <div class="app-shell">
        <div id="nav-root"></div>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title" data-i18n="dashboard.page.title">Dashboard</h1>
                    <p class="page-subtitle" data-i18n="dashboard.page.subtitle">Visión general de tu plataforma</p>
                </div>
            </div>

            <!-- ── Stat cards ── -->
            <div id="dash-stats" class="dash-stats"></div>

            <!-- ── Tokens + Composición ── -->
            <div class="dash-columns">
                <div class="dash-panel">
                    <div class="dash-panel-title" data-i18n="dashboard.tokens.title">Uso de tokens</div>
                    <div id="dash-tokens-total" class="dash-token-total"></div>
                    <div id="dash-tokens-body"></div>
                </div>
                <div class="dash-panel">
                    <div class="dash-panel-title" data-i18n="dashboard.composition.title">Composición de agentes</div>
                    <div id="dash-composition-body"></div>
                </div>
            </div>

            <!-- ── Agentes recientes ── -->
            <div>
                <div class="dash-section-header" style="margin-bottom:12px">
                    <span class="dash-section-title" data-i18n="dashboard.recent.title">Agentes recientes</span>
                    <a href="/agents" class="btn btn-ghost" style="font-size:0.75rem;padding:4px 10px" data-i18n="nav.agents">Agentes</a>
                </div>
                <div id="dash-recent-grid" class="dash-recent-grid"></div>
            </div>
        </main>
    </div>

    <!-- JS globales -->
    <script src="/assets/js/flog.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/toast.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/utils.js"></script>
    <!-- Componentes -->
    <script src="/assets/components/main_nav/main_nav.js"></script>
    <!-- Página -->
    <script src="/dashboard/dashboard.js"></script>
</body>

</html>

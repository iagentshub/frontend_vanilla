<!doctype html>
<html lang="es">

<head>
    <script src="/assets/js/theme-early.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="/assets/dist/core.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/assets/css/modals.css" />
    <link rel="stylesheet" href="/assets/components/workspace-create-wizard/workspace-create-wizard.css" />
    <link rel="stylesheet" href="/dashboard/dashboard.css" />
    <!-- Widget styles -->
    <link rel="stylesheet" href="/dashboard/widgets/summary/widget.css" />
    <link rel="stylesheet" href="/dashboard/widgets/token-usage/widget.css" />
    <link rel="stylesheet" href="/dashboard/widgets/activity/widget.css" />
    <link rel="stylesheet" href="/dashboard/widgets/conn-status/widget.css" />
    <link rel="stylesheet" href="/dashboard/widgets/recent/widget.css" />
    <link rel="stylesheet" href="/dashboard/widgets/feed/widget.css" />
</head>

<body>
    <div class="app-shell">
        <div id="nav-root"></div>

        <!-- Panel lateral de edicion — reemplaza al nav durante la personalizacion -->
        <aside id="dash-edit-sidebar" class="dash-edit-sidebar" style="display:none" aria-hidden="true">
            <div class="des-header">
                <span class="des-title">Personalizar</span>
                <button class="btn btn-ghost btn-sm des-add-btn" id="btn-add-widget" style="display:none">+ Añadir</button>
                <button class="btn btn-primary btn-sm" id="btn-done-editing">Listo</button>
            </div>
            <p class="des-hint">Pulsa un panel para anadirlo. Arrastra en el dashboard para reordenar. Usa × para quitar.</p>
            <div class="des-list" id="des-widget-list"></div>
        </aside>

        <main class="page-content">
            <div class="page-header dash-page-header">
                <div>
                    <h1 class="page-title" data-i18n="dashboard.page.title">Dashboard</h1>
                    <p class="page-subtitle" data-i18n="dashboard.page.subtitle">Vision general de tu plataforma</p>
                </div>
                <button id="btn-edit-dashboard" class="btn btn-ghost btn-sm">Personalizar</button>
            </div>

            <div id="dash-grid" class="dash-grid"></div>
        </main>
    </div>

    <script src="/assets/js/flog.js" defer></script>
    <script src="/assets/js/i18n.js" defer></script>
    <script src="/assets/js/config.js" defer></script>
    <script src="/assets/js/theme.js" defer></script>
    <script src="/assets/js/toast.js" defer></script>
    <script src="/assets/js/auth.js" defer></script>
    <script src="/assets/js/api.js" defer></script>
    <script src="/assets/js/utils.js" defer></script>
    <script src="/assets/components/main_nav/main_nav.js" defer></script>
    <script src="/assets/components/workspace-create-wizard/workspace-create-wizard.js" defer></script>
    <!-- Widget modules (deben cargarse antes que dashboard.js) -->
    <script src="/assets/js/soft-nav.js" defer></script>
    <script src="/dashboard/widgets/summary/widget.js" defer></script>
    <script src="/dashboard/widgets/token-usage/widget.js" defer></script>
    <script src="/dashboard/widgets/activity/widget.js" defer></script>
    <script src="/dashboard/widgets/conn-status/widget.js" defer></script>
    <script src="/dashboard/widgets/recent/widget.js" defer></script>
    <script src="/dashboard/widgets/feed/widget.js" defer></script>
    <script src="/dashboard/dashboard.js" defer></script>
    <script type="speculationrules">
    {
      "prefetch": [{
        "source": "document",
        "where": { "and": [
          { "href_matches": "/*" },
          { "not": { "href_matches": "/api/*" } },
          { "not": { "selector_matches": "[target=_blank]" } },
          { "not": { "selector_matches": "[rel~=nofollow]" } }
        ]},
        "eagerness": "moderate"
      }]
    }
    </script>
</body>

</html>

<!doctype html>
<html lang="es">

<head>
    <script>(function(){var m={noir:"dark-red",marble:"light-red",ember:"dark-orange",ocean:"dark-blue",forest:"dark-red",dusk:"dark-purple",light:"light-red"};var t=localStorage.getItem("ga-theme")||"dark-red";t=m[t]||t;document.documentElement.setAttribute("data-theme",t);})();</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Perfil</title>
    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/themes/themes.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/modals.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/profile/profile.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
    <link rel="stylesheet" href="/manager/manager.css" />
    <link rel="stylesheet" href="/assets/css/modals.css" />
</head>

<body>
    <div class="app-shell">
        <div id="nav-root"></div>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title" data-i18n="profile.page.title">Perfil</h1>
                    <p class="page-subtitle" data-i18n="profile.page.subtitle">Configuración de tu cuenta</p>
                </div>
            </div>

            <div class="profile-panel">
                <!-- Nav lateral -->
                <nav class="profile-nav">
                    <div class="profile-nav-user">
                        <div class="profile-avatar" id="profile-avatar">A</div>
                        <div class="profile-nav-user-info">
                            <div class="profile-username" id="profile-username">…</div>
                            <div class="profile-nav-badges">
                                <span class="profile-role-badge" id="profile-role">…</span>
                                <span class="profile-auth-badge" id="profile-auth-method" style="display:none"></span>
                            </div>
                        </div>
                    </div>

                    <div class="profile-nav-items">
                        <button class="profile-nav-item active" data-section="section-account">
                            <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                                <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
                                <path d="M2.5 13.5c0-3 2.5-4.5 5.5-4.5s5.5 1.5 5.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                            </svg>
                            <span data-i18n="profile.nav.account">Mi cuenta</span>
                        </button>
                        <button class="profile-nav-item" data-section="section-providers" id="nav-providers">
                            <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                                <circle cx="4" cy="8" r="2" stroke="currentColor" stroke-width="1.4"/>
                                <circle cx="12" cy="4" r="2" stroke="currentColor" stroke-width="1.4"/>
                                <circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="1.4"/>
                                <path d="M6 7.5l4-2.5M6 8.5l4 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                            </svg>
                            <span data-i18n="profile.nav.providers">Proveedores</span>
                        </button>
                        <button class="profile-nav-item" data-section="section-preferences">
                            <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                                <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
                                <path d="M8 2v2M8 12v2M2 8h2M12 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                            </svg>
                            <span data-i18n="profile.nav.preferences">Preferencias</span>
                        </button>
                        <button class="profile-nav-item" data-section="section-teams" id="nav-teams">
                            <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                                <circle cx="5" cy="5" r="2" stroke="currentColor" stroke-width="1.4"/>
                                <circle cx="11" cy="5" r="2" stroke="currentColor" stroke-width="1.4"/>
                                <path d="M1.5 13v-.5A3.5 3.5 0 0 1 5 9a3.5 3.5 0 0 1 3.5 3.5V13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                                <path d="M9 9.2A3.5 3.5 0 0 1 14.5 12.5V13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                            </svg>
                            <span data-i18n="teams.teams.page.title">Equipos</span>
                        </button>
                    </div>
                </nav>

                <!-- Contenido de secciones -->
                <div class="profile-sections">

                    <!-- Mi cuenta -->
                    <div id="section-account" class="profile-section">
                        <div class="section-title" data-i18n="profile.nav.account">Mi cuenta</div>

                        <div class="profile-info-block">
                            <div class="profile-info-row">
                                <span class="profile-info-label" data-i18n="profile.field_username">Usuario</span>
                                <span class="profile-info-value" id="profile-username-detail">…</span>
                            </div>
                            <div class="profile-info-row">
                                <span class="profile-info-label" data-i18n="profile.field_role">Rol</span>
                                <span class="profile-info-value" id="profile-role-detail">…</span>
                            </div>
                            <div class="profile-info-row">
                                <span class="profile-info-label" data-i18n="profile.field_auth">Acceso</span>
                                <span class="profile-info-value" id="profile-auth-detail">…</span>
                            </div>
                        </div>

                        <div id="password-card">
                            <div class="section-subtitle" data-i18n="profile.password_title">Cambiar contraseña</div>
                            <form id="password-form" novalidate>
                                <div class="field">
                                    <label data-i18n="profile.password.field_current">Contraseña actual</label>
                                    <input id="pw-current" class="input" type="password" autocomplete="current-password" placeholder="••••••••" />
                                </div>
                                <div class="field">
                                    <label data-i18n="profile.password.field_new">Nueva contraseña</label>
                                    <input id="pw-new" class="input" type="password" autocomplete="new-password" placeholder="••••••••" />
                                </div>
                                <div class="field">
                                    <label data-i18n="profile.password.field_confirm">Confirmar contraseña</label>
                                    <input id="pw-confirm" class="input" type="password" autocomplete="new-password" placeholder="••••••••" />
                                </div>
                                <div class="profile-form-footer">
                                    <button type="submit" class="btn btn-primary" id="pw-save-btn" data-i18n="profile.password.save_btn">Guardar cambios</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Proveedores -->
                    <div id="section-providers" class="profile-section" hidden>
                        <div class="section-title" data-i18n="profile.nav.providers">Proveedores</div>
                        <p class="section-desc" data-i18n="profile.accounts.subtitle"></p>
                        <div id="accounts-list" class="accounts-list"></div>
                    </div>

                    <!-- Equipos -->
                    <div id="section-teams" class="profile-section" hidden>
                        <div class="section-title" data-i18n="teams.teams.page.title">Equipos</div>

                        <!-- Pestañas horizontales -->
                        <div class="teams-tabs">
                            <button class="teams-tab active" data-teams-tab="my-teams" data-i18n="teams.teams.tabs.my_teams">Mis equipos</button>
                            <button class="teams-tab" data-teams-tab="invitations" data-i18n="teams.teams.tabs.invitations">Invitaciones</button>
                        </div>

                        <!-- Panel: Mis equipos -->
                        <div id="teams-panel-my" class="teams-tab-panel">
                            <div style="margin-bottom:12px;text-align:right">
                                <button class="btn btn-primary btn-sm" id="btn-create-team" data-i18n="teams.teams.create_team">Crear equipo</button>
                            </div>
                            <div id="teams-list-wrap"></div>
                        </div>

                        <!-- Panel: Invitaciones -->
                        <div id="teams-panel-invitations" class="teams-tab-panel" style="display:none">
                            <div class="section-subtitle" data-i18n="teams.teams.invitations.received_title">Recibidas</div>
                            <div id="teams-inv-received-wrap"></div>
                            <div class="section-subtitle" style="margin-top:20px" data-i18n="teams.teams.invitations.sent_title">Enviadas</div>
                            <div id="teams-inv-sent-wrap"></div>
                        </div>
                    </div>

                    <!-- Preferencias -->
                    <div id="section-preferences" class="profile-section" hidden>
                        <div class="section-title" data-i18n="profile.nav.preferences">Preferencias</div>

                        <div class="section-subtitle" data-i18n="profile.theme_title">Tema</div>
                        <div class="theme-picker" id="theme-picker"></div>

                        <div class="section-subtitle" style="margin-top:28px" data-i18n="profile.lang_title">Idioma</div>
                        <div class="lang-picker" id="lang-picker"></div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Modal conexión (mismo modal que /connections) -->
    <div id="conn-modal" class="modal-bg" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title" id="conn-modal-title" data-i18n="connections.modal.title_new">Nueva conexión</span>
                <button class="modal-close" id="conn-modal-close" type="button">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <form id="conn-form" novalidate>
                <div class="modal-body">
                    <input type="hidden" id="conn-id" />
                    <div class="field">
                        <label data-i18n="connections.modal.field_name">Nombre *</label>
                        <input id="conn-name" class="input" data-i18n-placeholder="connections.modal.placeholder_name" placeholder="Nombre de la conexión" required />
                    </div>
                    <div class="field">
                        <label data-i18n="connections.modal.field_provider">Proveedor</label>
                        <select id="conn-type" class="select"></select>
                    </div>
                    <div id="conn-dynamic-fields"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" id="conn-cancel" data-i18n="common.actions.cancel">Cancelar</button>
                    <button type="submit" class="btn btn-primary" data-i18n="common.actions.save">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal miembros del equipo -->
    <div id="modal-members" class="modal-bg" style="display:none">
        <div class="modal-box" style="max-width:580px">
            <div class="modal-header">
                <h3 class="modal-title" id="members-modal-title">Miembros</h3>
                <button class="modal-close" id="btn-members-close">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="admin-toolbar" style="margin-bottom:12px">
                    <div class="admin-search-wrap">
                        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span>
                        <input class="admin-search" id="members-modal-filter" placeholder="Filtrar miembros…" />
                    </div>
                    <button class="btn btn-ghost btn-sm" id="btn-members-invite" style="display:none" data-i18n="teams.teams.card.invite_member">Invitar</button>
                </div>
                <div id="members-table-wrap"></div>
            </div>
        </div>
    </div>

    <!-- Modal directorio del equipo -->
    <div id="modal-directory" class="modal-bg" style="display:none">
        <div class="modal-box" style="max-width:640px">
            <div class="modal-header">
                <h3 class="modal-title" id="directory-modal-title">Directorio</h3>
                <button class="modal-close" id="btn-directory-close">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="directory-modal-wrap"></div>
            </div>
        </div>
    </div>

    <!-- Modal permisos (compartido con manager-team.js) -->
    <div id="modal-permissions" class="modal-bg" style="display:none">
        <div class="modal-box" style="max-width:580px">
            <div class="modal-header">
                <h3 class="modal-title" id="perms-modal-title">Permisos</h3>
                <button class="modal-close" id="btn-perms-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="admin-tabs" style="margin-bottom:16px">
                    <button class="admin-tab active" data-perms-tab="agents" data-i18n="manager.manager.permissions.tabs.agents">Agentes</button>
                    <button class="admin-tab" data-perms-tab="connections" data-i18n="manager.manager.permissions.tabs.connections">Conexiones</button>
                    <button class="admin-tab" data-perms-tab="knowledge" data-i18n="manager.manager.permissions.tabs.knowledge">Conocimiento</button>
                </div>
                <div id="perms-tab-agents" class="perms-tab-panel">
                    <div class="perms-default-row">
                        <label class="toggle">
                            <input type="checkbox" id="perms-agents-default">
                            <span class="toggle-track"></span>
                        </label>
                        <span id="perms-agents-default-label"></span>
                    </div>
                    <div id="perms-agents-list" class="perms-resource-list"></div>
                </div>
                <div id="perms-tab-connections" class="perms-tab-panel" style="display:none">
                    <div class="perms-default-row">
                        <label class="toggle">
                            <input type="checkbox" id="perms-conns-default">
                            <span class="toggle-track"></span>
                        </label>
                        <span id="perms-conns-default-label"></span>
                    </div>
                    <div id="perms-conns-list" class="perms-resource-list"></div>
                </div>
                <div id="perms-tab-knowledge" class="perms-tab-panel" style="display:none">
                    <div class="perms-default-row">
                        <label class="toggle">
                            <input type="checkbox" id="perms-know-default">
                            <span class="toggle-track"></span>
                        </label>
                        <span id="perms-know-default-label"></span>
                    </div>
                    <div id="perms-know-list" class="perms-resource-list"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="btn-perms-cancel" data-i18n="actions.cancel">Cancelar</button>
                <button class="btn btn-primary" id="btn-perms-save" data-i18n="actions.save">Guardar</button>
            </div>
        </div>
    </div>

    <script src="/assets/js/flog.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/toast.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/providers.js"></script>
    <script src="/assets/components/main_nav/main_nav.js"></script>
    <script src="/connections/connections-modal.js"></script>
    <script src="/profile/profile.js"></script>
    <script src="/profile/profile-accounts.js"></script>
    <script src="/assets/js/share-teams.js"></script>
    <script src="/manager/manager-team.js"></script>
    <script src="/profile/profile-teams.js"></script>
</body>

</html>

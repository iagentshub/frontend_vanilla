<!doctype html>
<html lang="es">
<head>
    <script>(function(){var m={noir:"dark-red",marble:"light-red",ember:"dark-orange",ocean:"dark-blue",forest:"dark-red",dusk:"dark-purple",light:"light-red"};var t=localStorage.getItem("ga-theme")||"dark-red";t=m[t]||t;document.documentElement.setAttribute("data-theme",t);})();</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Perfil</title>
    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/themes/themes.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/assets/css/labels.css" />
    <link rel="stylesheet" href="/u/profile-public.css" />
</head>
<body>
    <div class="app-shell">
        <div id="nav-root"></div>

        <main class="page-content pub-profile-page">

            <!-- Loading state -->
            <div id="pub-loading" class="pub-loading">
                <div class="spinner"></div>
            </div>

            <!-- Error state -->
            <div id="pub-error" class="pub-error" hidden>
                <p id="pub-error-msg"></p>
                <a href="/" data-i18n="common.actions.back">← Volver</a>
            </div>

            <!-- Profile content -->
            <div id="pub-content" hidden>

                <!-- Header -->
                <div class="pub-header">
                    <div class="pub-avatar" id="pub-avatar">
                        <span id="pub-avatar-letter"></span>
                    </div>
                    <div class="pub-header-info">
                        <h1 class="pub-username" id="pub-username"></h1>
                        <div class="pub-meta" id="pub-meta"></div>
                        <div class="pub-header-actions">
                            <button id="pub-follow-btn" class="btn btn-ghost pub-follow-btn" hidden>
                                <span id="pub-follow-label" data-i18n="social.follow.btn_follow">Seguir</span>
                            </button>
                            <div class="pub-stats" id="pub-stats" hidden>
                                <span id="pub-followers"><strong id="pub-followers-count">0</strong> <span data-i18n="social.follow.followers">seguidores</span></span>
                                <span id="pub-following"><strong id="pub-following-count">0</strong> <span data-i18n="social.follow.following">siguiendo</span></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Bio -->
                <p class="pub-bio" id="pub-bio" hidden></p>

                <!-- Contact strip -->
                <div class="pub-contact" id="pub-contact" hidden></div>

                <!-- CV -->
                <section class="pub-section" id="pub-cv-section" hidden>
                    <h2 class="pub-section-title" data-i18n="profile.social.field_cv">CV</h2>
                    <div class="pub-cv-body" id="pub-cv-body"></div>
                </section>

                <!-- Resources tabs (phase 2+) -->
                <section class="pub-section" id="pub-resources-section" hidden>
                    <div class="pub-tabs">
                        <button class="pub-tab active" data-tab="agent" data-i18n="nav.agents">Agentes</button>
                        <button class="pub-tab" data-tab="skill" data-i18n="nav.skills">Skills</button>
                        <button class="pub-tab" data-tab="knowledge" data-i18n="nav.knowledge">Knowledge</button>
                    </div>
                    <div id="pub-resources-list" class="pub-resources-list">
                        <p class="pub-empty" data-i18n="profile.social.no_resources">Este usuario no tiene recursos públicos todavía.</p>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/labels.js"></script>
    <script src="/assets/components/main_nav/main_nav.js"></script>
    <script src="/u/profile-public.js"></script>
</body>
</html>

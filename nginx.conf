server {
    listen 80;
    server_name _;

    # Usar redirects relativos para no hardcodear scheme://host en los 301/302
    # automáticos (p.ej. añadir barra a directorios). Sin esto, en dev con
    # puerto 8007 nginx redirige a http://localhost/... en lugar de :8007.
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Cabeceras de seguridad ────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                              always;
    add_header X-Content-Type-Options "nosniff"                                 always;
    add_header X-XSS-Protection       "1; mode=block"                           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"         always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';"
        always;

    # ── API proxy → servicio backend ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8765;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / streaming: deshabilitar buffering
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    # ── Raíz → redirige a login ───────────────────────────────────────────────
    location = / {
        return 302 $scheme://$http_host/login/;
    }

    # ── Compatibilidad: /skills → /knowledge ────────────────────────────────
    location = /skills  { return 301 /knowledge; }
    location = /skills/ { return 301 /knowledge/; }

    # ── Register — explicit alias so nginx resolves /register → page ────────
    location = /register  { return 302 /register/; }
    location ^~ /register/ {
        try_files $uri $uri/index.html /pages/register/index.html =404;
    }

    # ── Verify / Forgot-password / Reset-password ────────────────────────────
    location = /verify          { return 302 /verify/; }
    location = /forgot-password { return 302 /forgot-password/; }
    location = /reset-password  { return 302 /reset-password/; }

    # ── Docs — evita conflicto con directorio /docs (markdown estático) ──────
    location = /docs  { return 302 /docs/; }
    location = /docs/ {
        try_files /pages/docs/index.html =404;
    }
    location ^~ /docs/ {
        try_files /pages$uri =404;
    }

    # ── About ────────────────────────────────────────────────────────────────
    location = /about  { return 302 /about/; }
    location = /about/ {
        try_files /pages/about/index.html =404;
    }
    location ^~ /about/ {
        try_files /pages$uri =404;
    }

    # ── Agents ───────────────────────────────────────────────────────────────
    # Sin este bloque, nginx cae en `try_files $uri/` dentro de location /,
    # que encuentra el directorio pages/agents/ (real en el bind-mount de dev)
    # y genera un redirect que ignora absolute_redirect off → pierde el puerto.
    # Los scripts /agents/*.js también fallan porque @pages siempre añade /index.html.
    location = /agents  { return 302 /agents/; }
    location = /agents/ {
        try_files /pages/agents/index.html =404;
    }
    location ^~ /agents/ {
        try_files /pages$uri =404;
    }

    # ── Assets estáticos: cache agresivo en browser ──────────────────────────
    location /assets/locales/ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        try_files $uri =404;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # ── Ficheros estáticos con URLs limpias ──────────────────────────────────
    location / {
        try_files $uri $uri/ @pages;
    }

    # IMPORTANTE: ir directo al index.html, nunca comprobar /pages$uri como
    # directorio. En named locations, try_files que encuentra un directorio
    # genera un redirect usando el puerto interno de nginx (80), ignorando
    # absolute_redirect off, lo que rompe dev en :8007 y expone /pages/... al browser.
    location @pages {
        try_files /pages$uri/index.html =404;
    }

    # Deshabilitar logs de favicon para reducir ruido
    location = /favicon.ico { log_not_found off; access_log off; }
}
